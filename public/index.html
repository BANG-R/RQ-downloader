<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All-in-One Video & Audio Downloader</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

  <div class="max-w-lg w-full bg-slate-800 p-6 rounded-2xl shadow-2xl border border-slate-700">
    <!-- Header -->
    <div class="text-center mb-6">
      <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
        Universal Downloader
      </h1>
      <p class="text-slate-400 text-xs mt-1">TikTok • YouTube • Instagram • Facebook</p>
    </div>

    <!-- Form Input -->
    <div class="space-y-4">
      <input type="text" id="mediaUrl" placeholder="Tempel URL video di sini..." 
             class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-cyan-400 text-sm text-white">

      <button onclick="processMedia()" id="btnSubmit" 
              class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-semibold py-3 rounded-xl transition duration-200">
        Cari Video
      </button>
    </div>

    <!-- Status Loading -->
    <div id="loading" class="hidden text-center mt-6 text-cyan-400 text-sm animate-pulse">
      Sedang mengambil data dari platform...
    </div>

    <!-- Hasil Download -->
    <div id="result" class="hidden mt-6 pt-6 border-t border-slate-700 text-center">
      <!-- Preview Section -->
      <div class="relative w-full h-48 bg-slate-900 rounded-xl mb-4 overflow-hidden border border-slate-700 flex items-center justify-center">
        <video id="mediaVideo" class="hidden w-full h-full object-contain" controls></video>
        <img id="mediaCover" class="w-full h-full object-cover" src="" alt="Thumbnail">
      </div>
      
      <h3 id="mediaTitle" class="font-medium text-sm line-clamp-2 mb-1"></h3>
      <p id="mediaAuthor" class="text-xs text-slate-400 mb-4"></p>

      <div class="grid grid-cols-2 gap-3">
        <a id="btnVideo" href="#" target="_blank" download
           class="block w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl transition duration-200 text-sm">
          Unduh Video (MP4)
        </a>
        <a id="btnAudio" href="#" target="_blank" download
           class="block w-full bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-3 rounded-xl transition duration-200 text-sm">
          Unduh Audio (MP3)
        </a>
      </div>
    </div>
  </div>

  <script>
    async function processMedia() {
      const urlInput = document.getElementById('mediaUrl').value.trim();
      
      const loading = document.getElementById('loading');
      const result = document.getElementById('result');
      const btnSubmit = document.getElementById('btnSubmit');

      if (!urlInput) {
        alert('Masukkan URL terlebih dahulu!');
        return;
      }

      loading.classList.remove('hidden');
      result.classList.add('hidden');
      btnSubmit.disabled = true;

      try {
        const res = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: urlInput })
        });

        const data = await res.json();

        if (data.success) {
          // Atur Metadata
          document.getElementById('mediaTitle').textContent = data.title;
          document.getElementById('mediaAuthor').textContent = `${data.platform} • @${data.author}`;
          
          // Atur Preview (Video atau Cover)
          const videoPlayer = document.getElementById('mediaVideo');
          const coverImg = document.getElementById('mediaCover');
          
          if (data.videoUrl) {
            videoPlayer.src = data.videoUrl;
            videoPlayer.classList.remove('hidden');
            coverImg.classList.add('hidden');
          } else {
            coverImg.src = data.cover;
            coverImg.classList.remove('hidden');
            videoPlayer.classList.add('hidden');
          }
          
          // Atur Tombol Download
          const btnVideo = document.getElementById('btnVideo');
          const btnAudio = document.getElementById('btnAudio');
          
          if (data.videoUrl) {
            btnVideo.href = data.videoUrl;
            btnVideo.style.display = 'block';
          } else {
            btnVideo.style.display = 'none';
          }

          if (data.audioUrl) {
            btnAudio.href = data.audioUrl;
            btnAudio.style.display = 'block';
          } else {
            btnAudio.style.display = 'none';
          }
          
          result.classList.remove('hidden');
        } else {
          alert(data.message || 'Gagal memproses URL tersebut.');
        }
      } catch (err) {
        alert('Terjadi kesalahan koneksi atau server.');
      } finally {
        loading.classList.add('hidden');
        btnSubmit.disabled = false;
      }
    }
  </script>
</body>
</html>

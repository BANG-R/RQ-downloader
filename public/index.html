<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All-in-One Video & Audio Downloader</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

  <div class="max-w-lg w-full bg-slate-800 p-6 rounded-2xl shadow-2xl border border-slate-700">
    <!-- Header -->
    <div class="text-center mb-6">
      <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
        Universal Downloader
      </h1>
      <p class="text-slate-400 text-xs mt-1">TikTok • YouTube • Instagram • Facebook</p>
    </div>

    <!-- Form Input -->
    <div class="space-y-4">
      <input type="text" id="mediaUrl" placeholder="Tempel URL video di sini (Otomatis memproses)..." 
             class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-cyan-400 text-sm text-white transition-all text-center">
             
      <button onclick="const url = document.getElementById('mediaUrl').value.trim(); if(url) processMedia(url);" id="btnSubmit" 
              class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-semibold py-3 rounded-xl transition duration-200">
        Cari Video
      </button>
    </div>

    <!-- Status Loading -->
    <div id="loading" class="hidden text-center mt-6 text-cyan-400 text-sm animate-pulse font-medium">
      Sedang mengambil data dari platform...
    </div>

    <!-- Hasil Download -->
    <div id="result" class="hidden mt-6 pt-6 border-t border-slate-700 text-center">
      <!-- Preview Section -->
      <div class="relative w-full h-48 bg-slate-900 rounded-xl mb-4 overflow-hidden border border-slate-700 flex items-center justify-center shadow-inner">
        <video id="mediaVideo" class="hidden w-full h-full object-contain" controls></video>
        <img id="mediaCover" class="w-full h-full object-cover" src="" alt="Thumbnail">
      </div>
      
      <h3 id="mediaTitle" class="font-medium text-sm line-clamp-2 mb-1"></h3>
      <p id="mediaAuthor" class="text-xs text-slate-400 mb-4"></p>

      <div class="grid grid-cols-2 gap-3">
        <button id="btnVideo" onclick="downloadFile(this.dataset.url, 'video.mp4', this, 'Unduh Video (MP4)')"
           class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-xl transition duration-200 text-sm shadow-lg shadow-emerald-500/30 active:scale-95">
          Unduh Video (MP4)
        </button>
        <button id="btnAudio" onclick="downloadFile(this.dataset.url, 'audio.mp3', this, 'Unduh Audio (MP3)')"
           class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-3 rounded-xl transition duration-200 text-sm shadow-lg shadow-cyan-500/30 active:scale-95">
          Unduh Audio (MP3)
        </button>
      </div>
    </div>

    <!-- Donation Section -->
    <div class="mt-8 text-center pt-6 border-t border-slate-700/50">
      <p class="text-xs text-slate-400 mb-3">Suka dengan layanan tanpa iklan ini?</p>
      <a href="https://saweria.co/raiQ" target="_blank" 
         class="inline-flex items-center justify-center gap-2 px-6 py-2.5 bg-yellow-500 hover:bg-yellow-600 text-yellow-950 font-bold rounded-full transition-all duration-200 text-sm shadow-lg shadow-yellow-500/20 hover:-translate-y-1">
        ☕ Traktir Kopi (Donasi Seikhlasnya)
      </a>
    </div>
  </div>

  <script>
    let lastProcessedUrl = '';

    // Auto-fetch saat user paste link
    document.getElementById('mediaUrl').addEventListener('input', function(e) {
      const url = e.target.value.trim();
      if (url.startsWith('http') && url !== lastProcessedUrl) {
        processMedia(url);
      }
    });

    async function processMedia(urlInput) {
      lastProcessedUrl = urlInput;
      
      const loading = document.getElementById('loading');
      const result = document.getElementById('result');
      const inputField = document.getElementById('mediaUrl');
      const btnSubmit = document.getElementById('btnSubmit');

      loading.classList.remove('hidden');
      result.classList.add('hidden');
      inputField.disabled = true;
      if(btnSubmit) btnSubmit.disabled = true;

      try {
        const res = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: urlInput })
        });

        const data = await res.json();

        if (data.success) {
          // Atur Metadata
          document.getElementById('mediaTitle').textContent = data.title;
          document.getElementById('mediaAuthor').textContent = `${data.platform} • @${data.author}`;
          
          // Atur Preview
          const videoPlayer = document.getElementById('mediaVideo');
          const coverImg = document.getElementById('mediaCover');
          
          if (data.videoUrl) {
            videoPlayer.src = data.videoUrl;
            videoPlayer.classList.remove('hidden');
            coverImg.classList.add('hidden');
          } else {
            coverImg.src = data.cover;
            coverImg.classList.remove('hidden');
            videoPlayer.classList.add('hidden');
          }
          
          // Atur URL di Button Dataset
          const btnVideo = document.getElementById('btnVideo');
          const btnAudio = document.getElementById('btnAudio');
          
          if (data.videoUrl) {
            btnVideo.dataset.url = data.videoUrl;
            btnVideo.style.display = 'block';
          } else {
            btnVideo.style.display = 'none';
          }

          if (data.audioUrl) {
            btnAudio.dataset.url = data.audioUrl;
            btnAudio.style.display = 'block';
          } else {
            btnAudio.style.display = 'none';
          }
          
          result.classList.remove('hidden');
        } else {
          alert(data.message || 'Gagal memproses URL tersebut.');
          lastProcessedUrl = ''; // reset agar bisa dicoba lagi
        }
      } catch (err) {
        alert('Terjadi kesalahan koneksi atau server.');
        lastProcessedUrl = '';
      } finally {
        loading.classList.add('hidden');
        inputField.disabled = false;
        if(btnSubmit) btnSubmit.disabled = false;
        inputField.focus(); // kembalikan fokus ke input
      }
    }

    // Fungsi untuk download langsung tanpa buka tab baru
    async function downloadFile(url, filename, btn, originalText) {
      if (!url) return;
      
      // Ubah teks tombol jadi loading
      btn.disabled = true;
      btn.textContent = 'Mengunduh... ⏳';
      btn.classList.add('opacity-75');

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Gagal mengambil file');
        
        const blob = await response.blob();
        const objectUrl = window.URL.createObjectURL(blob);
        
        // Buat elemen link sementara untuk memicu download
        const a = document.createElement('a');
        a.href = objectUrl;
        a.download = `Media_${Date.now()}_${filename}`;
        document.body.appendChild(a);
        a.click();
        
        // Bersihkan
        document.body.removeChild(a);
        window.URL.revokeObjectURL(objectUrl);
      } catch (error) {
        alert('Terjadi kesalahan saat mengunduh file. Kemungkinan diblokir sistem.');
      } finally {
        // Kembalikan tombol seperti semula
        btn.disabled = false;
        btn.textContent = originalText;
        btn.classList.remove('opacity-75');
      }
    }
  </script>
</body>
</html>
